# Production-style stack for passlify-core-service.
#
# This is NOT the local dev file (that's docker-compose.yml). Key differences vs dev:
#   - Keycloak runs in production mode ('start', not 'start-dev')
#   - Keycloak has its OWN persistent Postgres  -> users/roles survive restarts & recreates
#   - No mailpit: production uses a real external SMTP provider (SES/SendGrid/...), set via env
#   - No secrets in this file: everything sensitive comes from an env file (see .env.prod.example)
#
# Usage:
#   cp .env.prod.example .env.prod        # then fill in real secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# IMPORTANT about the realm import:
#   '--import-realm' seeds the 'passlify' realm on FIRST boot only. Because Keycloak now has a
#   persistent database, once the realm exists it is NOT re-imported, so roles/users you create
#   at runtime (admin console or Admin API) live in Postgres and persist forever.
#   To change realm CONFIG later, use the Admin API / Terraform (keycloak provider) - do NOT rely
#   on editing this JSON, and never run an OVERWRITE import against the live prod database.

services:
  # ---- Application database -------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: passlify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?set DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER:?set DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
    volumes:
      - passlify-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # No published port in prod: only the app (same network) needs it. Uncomment to expose.
    # ports:
    #   - "5432:5432"

  # ---- Keycloak's own database (separate from the app DB) -------------------
  keycloak-db:
    image: postgres:16-alpine
    container_name: passlify-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KC_DB_NAME:?set KC_DB_NAME}
      POSTGRES_USER: ${KC_DB_USER:?set KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?set KC_DB_PASSWORD}
    volumes:
      - passlify-keycloak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Keycloak (production mode) -------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: passlify-keycloak
    restart: unless-stopped
    command: ["start", "--import-realm"]
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # First-boot admin (change/remove after bootstrapping a real admin user)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:?set KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?set KC_ADMIN_PASSWORD}
      # Hostname & TLS: assumes a reverse proxy (nginx/traefik/Caddy) terminates HTTPS
      # and forwards to this container. Set KEYCLOAK_HOSTNAME to your public URL.
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:?set KEYCLOAK_HOSTNAME e.g. https://auth.passlify.rs}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"     # TLS is terminated at the proxy; KC speaks HTTP internally
      KC_HEALTH_ENABLED: "true"
    volumes:
      # Prod realm: HTTPS required, email verification on, real-domain redirect URIs,
      # external SMTP, no seeded test users. Imported into /import as passlify-realm.json.
      - ./keycloak/passlify-realm.prod.json:/opt/keycloak/data/import/passlify-realm.json:ro
    # Not published publicly: the reverse proxy fronts it. Bind to loopback if the proxy is on-host.
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      # Keycloak images ship no curl/wget; use bash's /dev/tcp against the mgmt health endpoint.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ---- Application ----------------------------------------------------------
  # Uncomment once a Dockerfile exists for passlify-core-service. Until then, run the
  # app however you deploy it, pointing at the services above via these env vars.
  #
  # app:
  #   build:
  #     context: ..
  #     dockerfile: Dockerfile
  #   image: passlify-core-service:latest
  #   container_name: passlify-core-service
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     keycloak:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_HOST: postgres
  #     DATABASE_PORT: "5432"
  #     DATABASE_NAME: ${DATABASE_NAME}
  #     DATABASE_USER: ${DATABASE_USER}
  #     DATABASE_PASSWORD: ${DATABASE_PASSWORD}
  #     KEYCLOAK_ISSUER_URI: ${KEYCLOAK_HOSTNAME}/realms/passlify
  #     # Real external SMTP (no mailpit in prod)
  #     MAIL_HOST: ${MAIL_HOST}
  #     MAIL_PORT: ${MAIL_PORT}
  #     MAIL_USERNAME: ${MAIL_USERNAME}
  #     MAIL_PASSWORD: ${MAIL_PASSWORD}
  #     MAIL_AUTH: "true"
  #     MAIL_STARTTLS: "true"
  #     PASSLIFY_QR_SECRET: ${PASSLIFY_QR_SECRET}
  #     PASSLIFY_MAIL_FROM: ${PASSLIFY_MAIL_FROM}
  #     APP_BASE_URL: ${APP_BASE_URL}
  #     PORT: "8081"
  #   ports:
  #     - "8081:8081"

volumes:
  passlify-pgdata:
  passlify-keycloak-pgdata:
