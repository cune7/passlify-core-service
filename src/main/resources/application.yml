spring:
  application:
    name: passlify-core-service
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:passlify}
    username: ${DATABASE_USER:passlify}
    password: ${DATABASE_PASSWORD:passlifypassword}
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; never 'update' in real envs
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak realm 'passlify'. Override per environment.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/passlify}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}          # smtp4dev / mailpit for local dev
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}

server:
  port: ${PORT:8081}              # 8080 is taken by Keycloak locally

passlify:
  # Default currency for new events when the organizer doesn't pick one (Serbia-first).
  default-currency: ${PASSLIFY_DEFAULT_CURRENCY:RSD}
  # How long a MANUAL (bank-transfer) order holds inventory awaiting confirmation.
  manual-payment-hold-hours: ${MANUAL_PAYMENT_HOLD_HOURS:72}
  event:
    # Default hours after an event's endsAt before it auto-completes (admin can override per event).
    auto-complete-grace-hours: ${EVENT_AUTO_COMPLETE_GRACE_HOURS:24}
    # How often the auto-completion sweep runs (ms).
    auto-complete-interval-ms: ${EVENT_AUTO_COMPLETE_INTERVAL_MS:3600000}
  # HMAC key for signing ticket QR tokens (used from the issuance slice onward).
  qr-secret: ${PASSLIFY_QR_SECRET:dev-only-change-me-min-32-bytes-secret!!}
  # HMAC key for signing collaborator invitation tokens.
  invite-secret: ${PASSLIFY_INVITE_SECRET:dev-only-change-me-min-32-bytes-invite!!}
  base-url: ${APP_BASE_URL:http://localhost:8081}
  # Raiffeisen via the UPC "e-Commerce Connect Gateway" (RSA-SHA1 signed redirect).
  # Inert until enabled=true; SUCCESS/FAILURE/NOTIFY URLs are registered per-terminal
  # at the bank, not sent per request. Keys are PEM (private = PKCS#8).
  raiffeisen:
    enabled: ${RAIFFEISEN_ENABLED:false}
    gateway-url: ${RAIFFEISEN_GATEWAY_URL:https://ecg.test.upc.ua/go/enter}
    merchant-id: ${RAIFFEISEN_MERCHANT_ID:}
    terminal-id: ${RAIFFEISEN_TERMINAL_ID:}
    locale: ${RAIFFEISEN_LOCALE:en}
    private-key: ${RAIFFEISEN_PRIVATE_KEY:}
    gateway-public-key: ${RAIFFEISEN_GATEWAY_PUBLIC_KEY:}
  # Stripe Checkout. Inert until enabled=true; then the STRIPE gateway bean + webhook
  # endpoint activate. Keys from the Stripe dashboard (use test-mode keys to verify).
  stripe:
    enabled: ${STRIPE_ENABLED:false}
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  mail:
    from: ${PASSLIFY_MAIL_FROM:tickets@passlify.rs}
    enabled: ${PASSLIFY_MAIL_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
